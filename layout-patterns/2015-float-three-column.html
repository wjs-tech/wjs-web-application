<!--
  ============================================================
  浮动三栏布局 - 左右定宽中间自适应，圣杯布局雏形

  布局方式：float浮动 + margin外边距
  布局思想：
    1. 左右两栏分别使用float:left和float:right浮动脱离文档流
    2. 中间主内容区通过左右margin避开两侧浮动元素
    3. HTML结构中左右栏需放在中间栏前面，确保浮动正确

  适用场景：
    - 新闻门户网站三栏布局
    - 电商商品详情页（左图+中间内容+右侧推荐）
    - 博客三栏布局（左导航+中正文+右 widgets）

  技术要点：
    - 左右浮动元素需在HTML中优先于中间元素
    - 中间列使用margin-left和margin-right实现自适应
    - 父容器需清除浮动以撑开高度
    - 注意浮动元素顺序影响布局效果

  可迁移性：
    - 可迁移到传统三栏布局网页
    - 兼容老旧浏览器，是圣杯布局的基础版本

  wjs created by 2015-09-20
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>浮动三栏布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; color: #333; }
    .header {
      height: 60px;
      background: #2c3e50;
      color: #fff;
      line-height: 60px;
      text-align: center;
    }
    .container {
      width: 1200px;
      margin: 20px auto;
      overflow: hidden;
    }
    .left {
      float: left;
      width: 200px;
      height: 500px;
      background: #e74c3c;
      color: #fff;
      padding: 20px;
    }
    .right {
      float: right;
      width: 250px;
      height: 500px;
      background: #9b59b6;
      color: #fff;
      padding: 20px;
    }
    .main {
      margin: 0 270px 0 220px;
      height: 500px;
      background: #ecf0f1;
      padding: 20px;
    }
    .footer {
      clear: both;
      height: 50px;
      background: #2c3e50;
      color: #fff;
      line-height: 50px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">头部 - 浮动三栏布局 Demo</div>
  <div class="container">
    <div class="left">
      <h3>左侧栏</h3>
      <p>定宽 200px</p>
      <p>float: left</p>
    </div>
    <div class="right">
      <h3>右侧栏</h3>
      <p>定宽 250px</p>
      <p>float: right</p>
    </div>
    <div class="main">
      <h2>主内容区</h2>
      <p>自适应宽度</p>
      <p>左右浮动 + margin 实现</p>
      <p>注意：HTML结构中左右栏在中间栏之前</p>
    </div>
  </div>
  <div class="footer">底部 - clear: both 清除浮动</div>
</body>
</html>
