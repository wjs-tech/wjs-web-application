<!--
  ============================================================
  粘性定位布局 - position:sticky 顶部导航栏吸顶效果

  布局方式：position: sticky 粘性定位
  布局思想：
    1. 元素在跨越特定阈值前为相对定位，之后为固定定位
    2. 设置 top: 0 使导航栏到达视口顶部时固定
    3. 粘性定位元素受父容器约束，父容器离开视口时粘性失效

  适用场景：
    - 网页顶部导航栏滚动吸顶
    - 侧边栏目录滚动跟随
    - 表格表头滚动时表头固定

  技术要点：
    - position: sticky 结合 top/bottom/left/right 使用
    - 父容器不能有 overflow: hidden 或 overflow: auto
    - 父容器高度必须大于粘性元素高度
    - 兼容性：需加 -webkit- 前缀兼容 Safari

  可迁移性：
    - 可迁移到任何需要吸顶导航的网站
    - 可用于侧边栏、表格头等需要粘性定位的元素

  wjs created by 2016-04-10
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>粘性定位布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; color: #333; }
    .top-banner {
      height: 80px;
      background: #e67e22;
      color: #fff;
      line-height: 80px;
      text-align: center;
    }
    .navbar {
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      height: 60px;
      background: #2c3e50;
      color: #fff;
      line-height: 60px;
      text-align: center;
      z-index: 100;
    }
    .navbar ul {
      list-style: none;
      display: flex;
      justify-content: center;
    }
    .navbar li {
      padding: 0 30px;
    }
    .content {
      width: 1200px;
      margin: 0 auto;
      padding: 30px 0;
    }
    .section {
      height: 400px;
      background: #ecf0f1;
      margin-bottom: 30px;
      padding: 30px;
    }
    .footer {
      height: 100px;
      background: #2c3e50;
      color: #fff;
      line-height: 100px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="top-banner">顶部横幅 - 滚动后会消失</div>
  <nav class="navbar">
    <ul>
      <li>首页</li>
      <li>产品</li>
      <li>服务</li>
      <li>关于我们</li>
      <li>联系我们</li>
    </ul>
  </nav>
  <div class="content">
    <div class="section">
      <h2>内容区域 1</h2>
      <p>向下滚动查看导航栏吸顶效果</p>
      <p>position: sticky + top: 0</p>
    </div>
    <div class="section">
      <h2>内容区域 2</h2>
      <p>导航栏始终固定在顶部</p>
    </div>
    <div class="section">
      <h2>内容区域 3</h2>
      <p>继续滚动...</p>
    </div>
    <div class="section">
      <h2>内容区域 4</h2>
      <p>粘性定位结合了 relative 和 fixed 的特点</p>
    </div>
  </div>
  <div class="footer">底部区域</div>
</body>
</html>
