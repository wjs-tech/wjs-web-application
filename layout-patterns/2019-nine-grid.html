<!--
  ============================================================
  九宫格布局 - 3x3九宫格，grid/flex实现

  布局方式：CSS Grid / Flexbox
  布局思想：
    1. 将容器划分为3行3列的九宫格结构
    2. 每个格子大小相等，排列整齐
    3. Grid方案最简洁，Flex方案兼容性更好

  适用场景：
    - 移动端APP首页功能入口
    - 图片画廊/照片墙
    - 产品分类导航
    - 游戏界面布局
    - 任何3x3网格展示场景

  技术要点：
    - Grid方案：display: grid + grid-template-columns: repeat(3, 1fr)
    - Flex方案：flex-wrap: wrap + 宽度 33.33%
    - aspect-ratio: 1 保持正方形
    - gap 控制格子间距
    - Grid方案代码更简洁，推荐使用

  可迁移性：
    - 可迁移到任何需要九宫格展示的页面
    - 移动端和PC端都适用
    - 可扩展为N列网格布局

  wjs created by 2019-03-10
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>九宫格布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", sans-serif;
      color: #333;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 { margin-bottom: 20px; color: #2c3e50; }
    h2 { margin: 25px 0 15px; color: #34495e; font-size: 18px; }
    .demo-section {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      max-width: 600px;
    }

    /* 方案一：Grid 方案 */
    .grid-nine {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 10px;
      aspect-ratio: 1;
    }
    .grid-nine .item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
    }
    .grid-nine .item .icon {
      font-size: 32px;
      margin-bottom: 8px;
    }
    .grid-nine .item:nth-child(2) { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .grid-nine .item:nth-child(3) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .grid-nine .item:nth-child(4) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
    .grid-nine .item:nth-child(5) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
    .grid-nine .item:nth-child(6) { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); color: #333; }
    .grid-nine .item:nth-child(7) { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); color: #333; }
    .grid-nine .item:nth-child(8) { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #333; }
    .grid-nine .item:nth-child(9) { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

    /* 方案二：Flex 方案 */
    .flex-nine {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      aspect-ratio: 1;
    }
    .flex-nine .item {
      width: calc((100% - 20px) / 3);
      height: calc((100% - 20px) / 3);
      background: #3498db;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 14px;
    }
    .flex-nine .item .num {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 4px;
    }
    .flex-nine .item:nth-child(odd) { background: #e74c3c; }
    .flex-nine .item:nth-child(even) { background: #2ecc71; }

    .label {
      display: inline-block;
      background: #f0f0f0;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>九宫格布局 Demo</h1>

  <div class="demo-section">
    <h2>方案一：CSS Grid 实现（推荐）</h2>
    <span class="label">grid-template-columns: repeat(3, 1fr)</span>
    <div class="grid-nine">
      <div class="item"><div class="icon">🏠</div>首页</div>
      <div class="item"><div class="icon">🛒</div>商城</div>
      <div class="item"><div class="icon">📱</div>消息</div>
      <div class="item"><div class="icon">👤</div>我的</div>
      <div class="item"><div class="icon">⚙️</div>设置</div>
      <div class="item"><div class="icon">🔔</div>通知</div>
      <div class="item"><div class="icon">📊</div>数据</div>
      <div class="item"><div class="icon">🎮</div>游戏</div>
      <div class="item"><div class="icon">📷</div>相册</div>
    </div>
  </div>

  <div class="demo-section">
    <h2>方案二：Flexbox 实现</h2>
    <span class="label">flex-wrap: wrap + 宽度 33.33%</span>
    <div class="flex-nine">
      <div class="item"><div class="num">1</div>格子一</div>
      <div class="item"><div class="num">2</div>格子二</div>
      <div class="item"><div class="num">3</div>格子三</div>
      <div class="item"><div class="num">4</div>格子四</div>
      <div class="item"><div class="num">5</div>格子五</div>
      <div class="item"><div class="num">6</div>格子六</div>
      <div class="item"><div class="num">7</div>格子七</div>
      <div class="item"><div class="num">8</div>格子八</div>
      <div class="item"><div class="num">9</div>格子九</div>
    </div>
  </div>
</body>
</html>
