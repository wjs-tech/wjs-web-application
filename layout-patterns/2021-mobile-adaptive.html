<!--
  ============================================================
  移动端自适应布局 - rem + flex 移动端适配，响应式设计

  布局方式：rem 相对单位 + Flex 弹性布局 + Media Query
  布局思想：
    1. 使用 rem 作为尺寸单位，通过设置 html 的 font-size 实现等比缩放
    2. 以 750px 设计稿为基准，JS 动态计算根元素 font-size
    3. 布局使用 Flex 实现弹性自适应，关键区域响应式调整

  适用场景：
    - H5 活动页面
    - 移动端官网
    - 移动端 Web App
    - 微信公众号页面
    - 需要适配各种手机屏幕的页面

  技术要点：
    - rem 单位：相对于根元素 font-size 的单位
    - JS 动态设置 html font-size，通常按屏幕宽度 / 设计稿宽度 * 基准字体
    - 配合 viewport meta 标签设置视口
    - Flex 布局实现灵活的页面结构
    - Media Query 处理横竖屏和极端尺寸
    - 设计稿通常是 750px（iPhone 6/7/8 物理像素）

  可迁移性：
    - 可迁移到任何移动端 H5 页面
    - rem 方案是移动端适配的经典方案
    - 可与 vw/vh、flexible.js 等方案结合

  wjs created by 2021-07-15
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>移动端自适应布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 50px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 0.28rem;
      max-width: 750px;
      margin: 0 auto;
    }

    .header {
      height: 0.9rem;
      background: #ff6b6b;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.34rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .banner {
      width: 100%;
      height: 3rem;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.36rem;
    }

    .nav-grid {
      display: flex;
      flex-wrap: wrap;
      background: #fff;
      padding: 0.3rem 0;
      margin-bottom: 0.2rem;
    }
    .nav-item {
      width: 25%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0.2rem 0;
    }
    .nav-item .icon {
      width: 0.8rem;
      height: 0.8rem;
      border-radius: 50%;
      background: #4ecdc4;
      margin-bottom: 0.15rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 0.36rem;
    }
    .nav-item .label {
      font-size: 0.24rem;
      color: #666;
    }

    .section {
      background: #fff;
      margin-bottom: 0.2rem;
      padding: 0.3rem;
    }
    .section-title {
      font-size: 0.32rem;
      font-weight: bold;
      margin-bottom: 0.25rem;
      padding-left: 0.15rem;
      border-left: 0.06rem solid #ff6b6b;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .card {
      display: flex;
      background: #fafafa;
      border-radius: 0.16rem;
      overflow: hidden;
    }
    .card .img {
      width: 2rem;
      height: 1.6rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      flex-shrink: 0;
    }
    .card .info {
      flex: 1;
      padding: 0.2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card .title {
      font-size: 0.28rem;
      font-weight: bold;
      color: #333;
    }
    .card .desc {
      font-size: 0.24rem;
      color: #999;
    }
    .card .price {
      font-size: 0.3rem;
      color: #ff6b6b;
      font-weight: bold;
    }

    .footer {
      height: 1rem;
      background: #fff;
      display: flex;
      border-top: 1px solid #eee;
      position: sticky;
      bottom: 0;
    }
    .footer-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 0.22rem;
      color: #999;
    }
    .footer-item.active {
      color: #ff6b6b;
    }
    .footer-item .icon {
      font-size: 0.4rem;
      margin-bottom: 0.05rem;
    }

    @media screen and (max-width: 320px) {
      html { font-size: 42.67px; }
    }
    @media screen and (min-width: 750px) {
      html { font-size: 50px; }
    }
  </style>
</head>
<body>
  <div class="header">移动端自适应布局</div>

  <div class="banner">
    Banner 轮播图区域
  </div>

  <div class="nav-grid">
    <div class="nav-item">
      <div class="icon">1</div>
      <div class="label">分类一</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #ff6b6b;">2</div>
      <div class="label">分类二</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #feca57;">3</div>
      <div class="label">分类三</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #5f27cd;">4</div>
      <div class="label">分类四</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #00d2d3;">5</div>
      <div class="label">分类五</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #ff9ff3;">6</div>
      <div class="label">分类六</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #54a0ff;">7</div>
      <div class="label">分类七</div>
    </div>
    <div class="nav-item">
      <div class="icon" style="background: #5f27cd;">8</div>
      <div class="label">分类八</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">精选推荐</div>
    <div class="card-list">
      <div class="card">
        <div class="img"></div>
        <div class="info">
          <div class="title">商品标题一</div>
          <div class="desc">这是商品描述信息</div>
          <div class="price">¥99.00</div>
        </div>
      </div>
      <div class="card">
        <div class="img" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);"></div>
        <div class="info">
          <div class="title">商品标题二</div>
          <div class="desc">这是商品描述信息</div>
          <div class="price">¥199.00</div>
        </div>
      </div>
      <div class="card">
        <div class="img" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);"></div>
        <div class="info">
          <div class="title">商品标题三</div>
          <div class="desc">这是商品描述信息</div>
          <div class="price">¥299.00</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-item active">
      <div class="icon">🏠</div>
      <div>首页</div>
    </div>
    <div class="footer-item">
      <div class="icon">📋</div>
      <div>分类</div>
    </div>
    <div class="footer-item">
      <div class="icon">🛒</div>
      <div>购物车</div>
    </div>
    <div class="footer-item">
      <div class="icon">👤</div>
      <div>我的</div>
    </div>
  </div>

  <script>
    function setRem() {
      var designWidth = 750;
      var baseFont = 50;
      var screenWidth = document.documentElement.clientWidth;
      if (screenWidth > 750) screenWidth = 750;
      var fontSize = (screenWidth / designWidth) * baseFont;
      document.documentElement.style.fontSize = fontSize + 'px';
    }
    setRem();
    window.addEventListener('resize', setRem);
    window.addEventListener('orientationchange', setRem);
  </script>
</body>
</html>
