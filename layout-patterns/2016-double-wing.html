<!--
  ============================================================
  双飞翼布局 - 和圣杯布局类似的经典三栏布局，中间列优先，通过margin负值实现

  布局方式：float浮动 + 负margin + 内部margin
  布局思想：
    1. 中间列放在HTML最前面，优先渲染，提升SEO和首屏体验
    2. 三列全部使用float:left，通过负margin把左右栏拉到中间列两侧
    3. 中间列内部套一层div，通过左右margin为左右栏预留空间，无需relative定位

  适用场景：
    - 内容优先的门户网站三栏布局
    - 电商商品详情页
    - 博客文章页
    - 比圣杯布局更简洁的三栏方案

  技术要点：
    - 中间列放在HTML结构最前面
    - 三列全部float:left
    - 左栏 margin-left: -100% 拉到最左边
    - 右栏 margin-left: -右栏宽度 拉到最右边
    - 中间列内部套一层，用margin左右留出空间
    - 不需要relative定位，比圣杯布局更简洁

  可迁移性：
    - 可迁移到任何需要三栏布局的网页
    - 是圣杯布局的改进版本，实现更简洁
    - 兼容性好，经典布局方案

  wjs created by 2016-11-20
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双飞翼布局</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Microsoft YaHei", sans-serif; color: #333; min-width: 600px; }
    .header {
      height: 60px;
      background: #2c3e50;
      color: #fff;
      line-height: 60px;
      text-align: center;
    }
    .container {
      overflow: hidden;
      margin: 20px 0;
    }
    .main {
      float: left;
      width: 100%;
    }
    .main-inner {
      height: 500px;
      background: #ecf0f1;
      padding: 20px;
      margin: 0 180px 0 200px;
    }
    .left {
      float: left;
      width: 200px;
      margin-left: -100%;
      height: 500px;
      background: #e74c3c;
      color: #fff;
      padding: 20px;
    }
    .right {
      float: left;
      width: 180px;
      margin-left: -180px;
      height: 500px;
      background: #9b59b6;
      color: #fff;
      padding: 20px;
    }
    .footer {
      clear: both;
      height: 50px;
      background: #2c3e50;
      color: #fff;
      line-height: 50px;
      text-align: center;
    }
    .highlight {
      background: #f39c12;
      color: #fff;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">头部 - 双飞翼布局 Demo（中间列优先，无需relative定位）</div>
  <div class="container">
    <div class="main">
      <div class="main-inner">
        <h2>主内容区（中间列）</h2>
        <p>HTML结构中排在第一位</p>
        <p>优先渲染，SEO友好</p>
        <p>宽度自适应</p>
        <p><span class="highlight">核心改进</span>：内部套 div，用 margin 留空间</p>
      </div>
    </div>
    <div class="left">
      <h3>左侧栏</h3>
      <p>定宽 200px</p>
      <p>margin-left: -100%</p>
      <p>无需 relative 定位</p>
    </div>
    <div class="right">
      <h3>右侧栏</h3>
      <p>定宽 180px</p>
      <p>margin-left: -180px</p>
      <p>无需 relative 定位</p>
    </div>
  </div>
  <div class="footer">底部</div>
</body>
</html>
