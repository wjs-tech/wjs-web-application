<!--
  ============================================================
  IM登录页 - IM即时通讯系统

  页面功能：XX企业IM系统登录页面，支持账号密码登录
  布局方式：居中卡片式登录界面，简洁现代风格
  业务背景：
    1. XX企业内部即时通讯系统登录入口
    2. 支持员工账号和工号登录
    3. 集成企业统一身份认证

  设计思路：
    1. 简洁大气的登录界面，突出品牌感
    2. 登录表单居中展示，视觉焦点集中
    3. 辅助登录方式和短信验证码登录

  技术要点：
    - 使用position和margin实现居中布局
    - 登录框卡片式设计带阴影效果
    - 切换登录方式的选项卡

  适用迁移场景：
    - 企业内部系统登录页
    - 即时通讯软件登录界面
    - SaaS产品登录页

  wjs created by 2016-07-05
  ============================================================
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XX企业IM - 登录</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }
    .login-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 900px;
      display: flex;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-left {
      flex: 1;
      min-height: 500px;
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      color: #fff;
      padding: 60px 50px;
      position: relative;
    }
    .brand-logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 30px;
    }
    .brand-logo span {
      color: #3498db;
    }
    .brand-slogan {
      font-size: 20px;
      margin-bottom: 20px;
      line-height: 1.6;
    }
    .brand-desc {
      font-size: 14px;
      color: #bdc3c7;
      line-height: 1.8;
    }
    .brand-features {
      margin-top: 40px;
    }
    .brand-features li {
      list-style: none;
      font-size: 14px;
      line-height: 2.5;
      color: #ecf0f1;
      padding-left: 25px;
      position: relative;
    }
    .brand-features li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: #2ecc71;
      font-weight: bold;
    }
    .login-right {
      flex: 1;
      min-height: 500px;
      background: #fff;
      padding: 50px 45px;
    }
    .login-title {
      font-size: 24px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #95a5a6;
      margin-bottom: 30px;
    }
    .login-tabs {
      overflow: hidden;
      margin-bottom: 30px;
      border-bottom: 1px solid #ecf0f1;
    }
    .tab-item {
      float: left;
      padding: 12px 0;
      margin-right: 30px;
      font-size: 15px;
      color: #7f8c8d;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab-item.active {
      color: #2c3e50;
      border-bottom-color: #3498db;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }
    .input-group {
      position: relative;
    }
    .input-group input {
      width: 100%;
      height: 45px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0 15px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-group input:focus {
      border-color: #3498db;
    }
    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #bdc3c7;
      font-size: 16px;
    }
    .input-with-icon input {
      padding-left: 40px;
    }
    .captcha-group {
      overflow: hidden;
    }
    .captcha-group .captcha-input-wrap {
      float: left;
      width: 60%;
    }
    .captcha-img {
      float: right;
      width: 35%;
      height: 45px;
      background: linear-gradient(135deg, #ecf0f1, #bdc3c7);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2c3e50;
      font-weight: bold;
      letter-spacing: 3px;
      font-size: 18px;
      cursor: pointer;
      box-sizing: border-box;
    }
    .form-options {
      overflow: hidden;
      margin-bottom: 25px;
      font-size: 13px;
    }
    .remember {
      float: left;
      color: #7f8c8d;
    }
    .remember input {
      margin-right: 5px;
      vertical-align: middle;
    }
    .forgot {
      float: right;
      color: #3498db;
      cursor: pointer;
      text-decoration: none;
    }
    .login-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .login-btn:hover {
      background: linear-gradient(135deg, #2980b9, #2c3e50);
    }
    .other-login {
      margin-top: 25px;
      text-align: center;
    }
    .other-title {
      font-size: 12px;
      color: #bdc3c7;
      margin-bottom: 15px;
      position: relative;
    }
    .other-title::before,
    .other-title::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 30%;
      height: 1px;
      background: #ecf0f1;
    }
    .other-title::before {
      left: 0;
    }
    .other-title::after {
      right: 0;
    }
    .other-icons {
      font-size: 13px;
      color: #7f8c8d;
    }
    .other-icons span {
      margin: 0 10px;
      cursor: pointer;
    }
    .sms-login {
      padding: 10px 0;
    }
    .sms-form-group {
      margin-bottom: 20px;
    }
    .sms-form-group label {
      display: block;
      font-size: 13px;
      color: #7f8c8d;
      margin-bottom: 8px;
    }
    .sms-input-group {
      position: relative;
    }
    .sms-input-group input {
      width: 100%;
      height: 45px;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 0 15px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }
    .sms-input-group input:focus {
      border-color: #3498db;
    }
    .sms-captcha-group {
      overflow: hidden;
    }
    .sms-captcha-input {
      float: left;
      width: 60%;
    }
    .sms-captcha-btn {
      float: right;
      width: 35%;
      height: 45px;
      background: #ecf0f1;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      color: #3498db;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-left">
      <div class="brand-logo">XX<span>IM</span></div>
      <div class="brand-slogan">企业级<br>即时通讯平台</div>
      <div class="brand-desc">
        安全、高效、专业的企业沟通工具，<br>
        助力团队协作，提升办公效率。
      </div>
      <ul class="brand-features">
        <li>消息已读回执，沟通更高效</li>
        <li>万人超大群，协作更便捷</li>
        <li>文件传输，安全快速</li>
        <li>企业通讯录，找人更方便</li>
      </ul>
    </div>

    <div class="login-right">
      <h2 class="login-title">欢迎登录</h2>
      <p class="login-subtitle">XX企业IM，让工作沟通更简单</p>

      <div class="login-tabs">
        <div class="tab-item active">账号密码登录</div>
        <div class="tab-item">短信登录</div>
      </div>

      <div class="login-content">
        <form>
          <div class="form-group">
            <label>账号</label>
            <div class="input-group input-with-icon">
              <span class="input-icon">👤</span>
              <input type="text" placeholder="请输入账号/工号/手机号">
            </div>
          </div>
          <div class="form-group">
            <label>密码</label>
            <div class="input-group input-with-icon">
              <span class="input-icon">🔒</span>
              <input type="password" placeholder="请输入密码">
            </div>
          </div>
          <div class="form-group">
            <label>验证码</label>
            <div class="captcha-group">
              <div class="captcha-input-wrap">
                <div class="input-group">
                  <input type="text" placeholder="请输入验证码">
                </div>
              </div>
              <div class="captcha-img">A7X9</div>
            </div>
          </div>
          <div class="form-options">
            <label class="remember">
              <input type="checkbox"> 记住密码
            </label>
            <a href="#" class="forgot">忘记密码？</a>
          </div>
          <button type="button" class="login-btn">登 录</button>
        </form>

        <div class="other-login">
          <div class="other-title">其他登录方式</div>
          <div class="other-icons">
            <span>钉钉登录</span>
            <span>QQ账号</span>
            <span>验证码登录</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
